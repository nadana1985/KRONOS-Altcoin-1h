    beta_window: 50
    min_data_density: 60
    fallback_vol: 0.01

  point_58:
    # DFA Volatility Scaling
    dfa_window: 50
    dfa_scale: 1.0
    min_data_density: 100
    fallback_vol: 0.01

  point_59:
    # Hurst-Adaptive Volatility Memory
    hurst_window: 50
    base_lambda: 0.1
    min_data_density: 60
    fallback_lambda: 0.1

  point_60:
