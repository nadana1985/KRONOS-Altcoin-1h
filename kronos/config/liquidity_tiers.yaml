# KRONOS V1-ALT — Liquidity Tiering Configuration (Phase 0 Step 0.2)
# Single source of truth for the 5-tier dynamic liquidity classifier.
# All thresholds, weights, windows, and normalization references live here.
# No magic numbers in the Python implementation.

version: "0.2"
lookback_default: 288          # Default rolling window (288h = 12 days). Override per call.
min_data_density: 48           # Minimum valid bars required before trusting classification (fallback otherwise)
fallback_tier: "medium"        # Safe default when data insufficient or errors occur

# Composite score weights (must sum close to 1.0). Higher score => more liquid.
metrics:
  volume_weight: 0.38
  amihud_weight: 0.26
  trade_count_weight: 0.15
  spread_weight: 0.13
  zero_bar_weight: 0.08

# Tier boundaries on the final liquidity score [0, 1]
tier_thresholds:
  very_high: 0.78
  high: 0.58
  medium: 0.32
  low: 0.12
  # score < low => micro

# Absolute / veto guards (applied after score-based tiering for safety)
absolute_guards:
  enabled: true
  very_high_min_24h_quote_volume: 45000000   # ~45M USDT median quote vol consideration for very_high
  high_min_24h_quote_volume: 7000000         # ~7M for high
  low_max_zero_bar_pct: 28                   # if zero-volume bars exceed this in window, cannot be better than 'low'
  micro_max_zero_bar_pct: 45                 # force micro if extremely sparse

# Normalization references (used for per-metric sub-scores in [0,1])
# These are chosen for 1h USDT perps altcoin universe; adjust only via this file.
normalization:
  log_volume:
    ref_low: 11.5     # ln( ~100k USDT )
    ref_high: 19.5    # ln( ~290M USDT )
  amihud:
    ref_high: 2.5e-5  # illiquidity value considered "very bad"
  spread:
    ref_high: 0.018   # ~1.8% average (high-low)/close considered poor
  trade_count:
    ref_low: 80
    ref_high: 8500

# Spread proxy settings
spread:
  method: "high_low_ratio"   # high-low / close mean over window
  proxy_mult: 1.0

# Internal numerical stability (not user-facing bias parameters)
numerical:
  eps: 1e-12

# Logging controls
logging:
  enabled: true
  include_metrics_on_info: true   # When true, INFO logs contain full metric breakdown + reason

# ─────────────────────────────────────────────────────────────────────
# Bias Override Parameters (Phase 0 Step 0.3+)
# All numeric configuration for individual bias points lives here.
# The engine and point implementations load from this section.
# No literals for these values are allowed in Python code.
# ─────────────────────────────────────────────────────────────────────
overrides:
  point_01:
    # Rolling Out-of-Sample Empirical Quantile Veto
    quantile: 0.65
    lookback_default: 100
    lookback_min: 30
    lookback_max: 400
    min_data_density: 50
    # When history insufficient, fall back to this conservative static threshold
    fallback_static_threshold: 0.60
    # Future: volatility scaling params (see Point 02)
    # volatility_scaling:
    #   enabled: false
    #   gamma: 0.5

  point_02:
    # Rigid Feature Window Bias - Volatility-Scaled Lookback Adaptation
    # W_t = round( W_base * (1 + sigma_rel,t ^ (-gamma)) )
    gamma: 0.5
    # Window for recent realized volatility (std of log returns)
    vol_short_window: 20
    # Reference for relative vol: "median" of rolling stds over this window, or a fixed length
    vol_reference_window: 100
    # Or use "median" for robust reference
    vol_reference_method: "median"   # "median" | "mean" | fixed length
    min_lookback: 20
    max_lookback: 500
    min_data_density: 30
    # When vol cannot be computed reliably, fall back to base * this (1.0 = no change)
    fallback_multiplier: 1.0
    # Example default bases for key features (callers may pass their own base_window)
    default_base_lookback: 100
    # Specific bases mentioned in manual / params (for illustration / direct use)
    vpin_base: 100
    ofi_base: 50
    amihud_base: 50
    slot15_history_base: 100

  point_04:
    # Manual Linear Multiplier Bias → Rolling Percentile Rank Transform
    rank_window: 100
    min_data_density: 100
    fallback_rank: 0.5   # neutral rank when insufficient history
    clip_min: 0.05
    clip_max: 0.95

  point_08:
    # Hardcoded Lookback Scaling Ratios → (practical) Adaptive Cycle Scaling
    # Proxy for EMD IMF wavelength using recent excursion / vol
    cycle_window: 50
    alpha: 1.0           # scaling coefficient for W_adaptive
    min_lookback: 20
    max_lookback: 400
    min_data_density: 50
    fallback_multiplier: 1.0

  point_09:
    # Static Percentage Threshold Bias → ATR-Weighted Volatility Bandwidths
    atr_window: 20
    kappa: 1.5           # ATR multiple
    min_data_density: 50
    fallback_bandwidth: 0.005   # 0.5% conservative
    min_bandwidth: 0.001
    max_bandwidth: 0.05

  point_11:
    # Arbitrary EWM Smoothing Span Bias → Volume-Synchronized Exponential Smoothing
    base_alpha: 0.1
    vol_window: 50
    min_data_density: 50
    fallback_alpha: 0.1
    min_alpha: 0.01
    max_alpha: 0.5

  point_14:
    # Hardcoded Denominator Epsilon Guards → Dynamic Sigma-Scaled Epsilon
    eps_scale: 1e-7
    sigma_window: 50
    min_data_density: 30
    fallback_eps: 1e-8
    min_eps: 1e-12
    max_eps: 1e-3

  # ------------------------------------------------------------------
  # Volatility Estimator Batch (Points 46-52, 57)
  # All advanced range-based, robust, and clustering-aware estimators.
  # Raw baseline is typically close-to-close log-return std.
  # ------------------------------------------------------------------

  point_46:
    # Yang-Zhang: combines overnight + open-close + RS with weight k
    vol_window: 20
    yz_k: 0.34
    min_data_density: 50
    fallback_vol: 0.01   # conservative daily-ish vol for 1h bars

  point_47:
    # Rogers-Satchell (drift robust range vol)
    vol_window: 20
    min_data_density: 30
    fallback_vol: 0.01

  point_48:
    # MAD robust vol
    mad_window: 20
    mad_scale: 1.4826
    min_data_density: 30
    fallback_vol: 0.01

  point_49:
    # Garman-Klass with overnight
    vol_window: 20
    gk_overnight_weight: 0.5
    min_data_density: 50
    fallback_vol: 0.01

  point_50:
    # Parkinson (high-low range)
    vol_window: 20
    min_data_density: 30
    fallback_vol: 0.01

  point_51:
    # Simple GARCH(1,1) tracker (empirical params)
    garch_omega: 1e-6
    garch_alpha: 0.08
    garch_beta: 0.85
    garch_window: 50   # for initial var or burn-in
    min_data_density: 60
    fallback_vol: 0.01

  point_52:
    # Downside semi-vol (negative returns only)
    vol_window: 20
    min_data_density: 30
    fallback_vol: 0.01

  point_57:
    # Bid-ask filtered RS (builds on 47)
    vol_window: 20
    spread_proxy: 0.0005   # or can be dynamic later from point 17
    min_data_density: 30
    fallback_vol: 0.01

  point_53:
